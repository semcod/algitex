pipeline:
  name: algitex-quality-loop
  profile: python-minimal

  metrics:
    cc_max: 15
    coverage_min: 35
    critical_max: 0

  stages:
    - name: test
      run: .venv/bin/pytest tests/ --cov=src/algitex --cov-report=json:.pyqual/coverage.json -q
      when: always

  env:
    LLM_MODEL: openrouter/qwen/qwen3-coder-next
    LLX_DEFAULT_TIER: balanced
    LLX_VERBOSE: true
