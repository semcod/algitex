# LiteLLM Proxy Configuration for OpenRouter
# Usage: litellm --config litellm_config.yaml --port 4000

model_list:
  - model_name: openrouter-model
    litellm_params:
      model: openrouter/qwen/qwen3-coder-next
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

litellm_settings:
  drop_params: true
  max_budget: 60
  budget_duration: 30d

# Rate limits
router_settings:
  rate_limit_mode: dynamic
  timeout: 120

# Logging
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  service_callback: []
