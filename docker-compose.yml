# algitex — full local stack
#
# Usage:
#   cp .env.example .env       # configure API keys
#   docker compose up -d       # start everything
#   docker compose exec algitex algitex status
#   docker compose logs -f proxym
#
# Profiles:
#   docker compose up -d                     # core only (proxym + redis)
#   docker compose --profile tools up -d     # + aider, github MCP
#   docker compose --profile full up -d      # everything

services:
  # ── Core: algitex CLI ───────────────────────────────
  algitex:
    build: .
    volumes:
      - algitex-data:/app/data
      - ./examples:/app/examples:ro
      - ./.algitex:/app/.algitex
    environment:
      - PROXYM_URL=http://proxym:4000
      - PROXYM_API_KEY=${PROXYM_API_KEY:-sk-proxy-local-dev}
      - ALGITEX_VERBOSE=${ALGITEX_VERBOSE:-false}
    depends_on:
      proxym:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped

  # ── LLM Gateway ────────────────────────────────────
  proxym:
    build:
      context: ./docker/proxym
      dockerfile: Dockerfile
    image: algitex/proxym-mcp:latest
    ports:
      - "${PROXYM_PORT:-4000}:4000"
    environment:
      - TRANSPORT=http
      - MCP_TRANSPORT=http
      - PORT=4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4}
      - DAILY_BUDGET=${PROXYM_DAILY_BUDGET:-3.0}
      - MONTHLY_BUDGET=${PROXYM_MONTHLY_BUDGET:-60.0}
      - REDIS_HOST=redis
    volumes:
      - proxym-data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ── MCP Tools (profile: tools) ─────────────────────
  # Using our standardized MCP images with FastMCP SDK
  aider-mcp:
    build:
      context: ./docker/aider-mcp
      dockerfile: Dockerfile
    image: algitex/aider-mcp:latest
    profiles: ["tools", "full"]
    environment:
      - TRANSPORT=stdio
      - MCP_TRANSPORT=stdio
      - EDITOR_MODEL=${AIDER_MODEL:-gemini/gemini-2.5-flash}
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
    restart: unless-stopped

  code2llm-mcp:
    build:
      context: ./docker/code2llm
      dockerfile: Dockerfile
    image: algitex/code2llm-mcp:latest
    profiles: ["tools", "full"]
    environment:
      - TRANSPORT=http
      - PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./:/workspace:ro
    restart: unless-stopped

  vallm-mcp:
    build:
      context: ./docker/vallm
      dockerfile: Dockerfile
    image: algitex/vallm-mcp:latest
    profiles: ["tools", "full"]
    environment:
      - TRANSPORT=http
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace:ro
    restart: unless-stopped

  planfile-mcp:
    build:
      context: ./docker/planfile-mcp
      dockerfile: Dockerfile
    image: algitex/planfile-mcp:latest
    profiles: ["tools", "full"]
    environment:
      - TRANSPORT=http
      - PORT=8201
      - DATA_DIR=/data
    ports:
      - "8201:8201"
    volumes:
      - ./data/planfile:/data
    restart: unless-stopped

  # ── GitHub MCP (disabled - requires GHCR auth) ────
  # github-mcp:
  #   image: ghcr.io/modelcontextprotocol/server-github:latest
  #   profiles: ["tools", "full"]
  #   environment:
  #     - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
  #   restart: unless-stopped

  # ── Verified MCP Servers from Docker Hub ────────────
  # NOTE: Most mcp/* images don't exist publicly.
  # Only verified working images are enabled below.

  mcp-filesystem:
    image: mcp/filesystem:latest
    profiles: ["tools", "full"]
    command: ["/workspace"]
    volumes:
      - ./:/workspace:ro
    restart: unless-stopped

  # ── Monitoring (profile: full) ─────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    profiles: ["full"]
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:-algitex-secret-change-me}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - langfuse-db
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    profiles: ["full"]
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  algitex-data:
  proxym-data:
  redis-data:
  langfuse-data:

networks:
  default:
    name: algitex-net
