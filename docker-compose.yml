# algitex вЂ” full local stack
#
# Usage:
#   cp .env.example .env       # configure API keys
#   docker compose up -d       # start everything
#   docker compose exec algitex algitex status
#   docker compose logs -f proxym
#
# Profiles:
#   docker compose up -d                     # core only (proxym + redis)
#   docker compose --profile tools up -d     # + aider, github MCP
#   docker compose --profile full up -d      # everything

version: "3.8"

services:
  # в”Ђв”Ђ Core: algitex CLI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  algitex:
    build: .
    volumes:
      - algitex-data:/app/data
      - ./examples:/app/examples:ro
      - ./.algitex:/app/.algitex
    environment:
      - PROXYM_URL=http://proxym:4000
      - PROXYM_API_KEY=${PROXYM_API_KEY:-sk-proxy-local-dev}
      - ALGITEX_VERBOSE=${ALGITEX_VERBOSE:-false}
    depends_on:
      proxym:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped

  # в”Ђв”Ђ LLM Gateway в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  proxym:
    image: wronai/proxym:latest
    build:
      context: https://github.com/wronai/proxym.git
      dockerfile: Dockerfile
    ports:
      - "${PROXYM_PORT:-4000}:4000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PROXYM_DAILY_BUDGET=${PROXYM_DAILY_BUDGET:-3.0}
      - PROXYM_MONTHLY_BUDGET=${PROXYM_MONTHLY_BUDGET:-60.0}
      - REDIS_HOST=redis
    volumes:
      - proxym-data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # в”Ђв”Ђ Cache в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # в”Ђв”Ђ MCP Tools (profile: tools) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  aider-mcp:
    image: danielscholl/aider-mcp-server:latest
    profiles: ["tools", "full"]
    environment:
      - TRANSPORT=stdio
      - EDITOR_MODEL=${AIDER_MODEL:-gemini/gemini-2.5-flash}
      - GEMINI_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    stdin_open: true
    tty: true
    restart: unless-stopped

  github-mcp:
    image: ghcr.io/modelcontextprotocol/server-github:latest
    profiles: ["tools", "full"]
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped

  # в”Ђв”Ђ Monitoring (profile: full) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  langfuse:
    image: langfuse/langfuse:latest
    profiles: ["full"]
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:-algitex-secret-change-me}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - langfuse-db
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    profiles: ["full"]
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  algitex-data:
  proxym-data:
  redis-data:
  langfuse-data:

networks:
  default:
    name: algitex-net
