# Docker Compose for Algitex tools
# Build and run all custom MCP and REST servers

version: '3.8'

services:
  aider-mcp:
    build:
      context: ./aider-mcp
      dockerfile: Dockerfile
    image: algitex/aider-mcp:latest
    container_name: algitex-aider-mcp
    environment:
      - TRANSPORT=stdio
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ${PROJECT_DIR:-.}:/workspace
    stdin_open: true
    tty: true
    networks:
      - algitex

  planfile-mcp:
    build:
      context: ./planfile-mcp
      dockerfile: Dockerfile
    image: algitex/planfile-mcp:latest
    container_name: algitex-planfile-mcp
    environment:
      - TRANSPORT=rest
      - PORT=8201
      - DATA_DIR=/data
    ports:
      - "9001:8201"
    volumes:
      - ./data:/data
    networks:
      - algitex

  proxym:
    build:
      context: ./proxym
      dockerfile: Dockerfile
    image: algitex/proxym:latest
    container_name: algitex-proxym
    environment:
      - PORT=4001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DAILY_BUDGET=10.0
    ports:
      - "9002:4001"
    networks:
      - algitex

  vallm-mcp:
    build:
      context: ./vallm
      dockerfile: Dockerfile
    image: algitex/vallm-mcp:latest
    container_name: algitex-vallm-mcp
    environment:
      - TRANSPORT=http
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ${PROJECT_DIR:-.}:/project:ro
    networks:
      - algitex
    profiles:
      - tools
      - full

  code2llm-mcp:
    build:
      context: ./code2llm
      dockerfile: Dockerfile
    image: algitex/code2llm-mcp:latest
    container_name: algitex-code2llm-mcp
    environment:
      - TRANSPORT=http
      - PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ${PROJECT_DIR:-.}:/project:ro
    networks:
      - algitex
    profiles:
      - tools
      - full

  # ─── Community MCP Tools (Optional - requires Docker Hub auth) ─────
  # NOTE: These images require authentication to ghcr.io or Docker Hub
  # Run with: docker-compose --profile mcp up -d

  mcp-github:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: algitex-mcp-github
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

  mcp-fetch:
    image: mcp/fetch:latest
    container_name: algitex-mcp-fetch
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

  mcp-filesystem:
    image: mcp/filesystem:latest
    container_name: algitex-mcp-filesystem
    environment:
      - MCP_TRANSPORT=stdio
      - ALLOW_DIRS=/workspace
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:ro
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

  mcp-git:
    image: mcp/git:latest
    container_name: algitex-mcp-git
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:ro
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

  mcp-sqlite:
    image: mcp/sqlite:latest
    container_name: algitex-mcp-sqlite
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - ${PROJECT_DIR:-.}:/workspace
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

  mcp-time:
    image: mcp/time:latest
    container_name: algitex-mcp-time
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex
    profiles:
      - mcp

networks:
  algitex:
    driver: bridge
