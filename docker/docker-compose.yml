# Docker Compose for Algitex tools
# Build and run all custom MCP and REST servers

version: '3.8'

services:
  aider-mcp:
    build:
      context: ./aider-mcp
      dockerfile: Dockerfile
    image: algitex/aider-mcp:latest
    container_name: algitex-aider-mcp
    environment:
      - TRANSPORT=stdio
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ${PROJECT_DIR:-.}:/workspace
    stdin_open: true
    tty: true
    networks:
      - algitex

  planfile-mcp:
    build:
      context: ./planfile-mcp
      dockerfile: Dockerfile
    image: algitex/planfile-mcp:latest
    container_name: algitex-planfile-mcp
    environment:
      - TRANSPORT=rest
      - PORT=8201
      - DATA_DIR=/data
    ports:
      - "8201:8201"
    volumes:
      - ./data:/data
    networks:
      - algitex

  proxym:
    build:
      context: ./proxym
      dockerfile: Dockerfile
    image: algitex/proxym:latest
    container_name: algitex-proxym
    environment:
      - PORT=4000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DAILY_BUDGET=10.0
    ports:
      - "4000:4000"
    networks:
      - algitex

  vallm:
    build:
      context: ./vallm
      dockerfile: Dockerfile
    image: algitex/vallm:latest
    container_name: algitex-vallm
    environment:
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ${PROJECT_DIR:-.}:/project:ro
    networks:
      - algitex

  code2llm:
    build:
      context: ./code2llm
      dockerfile: Dockerfile
    image: algitex/code2llm:latest
    container_name: algitex-code2llm
    environment:
      - PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ${PROJECT_DIR:-.}:/project:ro
    networks:
      - algitex

  # ─── MCP Tools from Docker Hub ─────────────────────────

  mcp-github:
    image: mcp/github:latest
    container_name: algitex-mcp-github
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PAT}
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-wikipedia:
    image: mcp/wikipedia-mcp:latest
    container_name: algitex-mcp-wikipedia
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-time:
    image: mcp/time:latest
    container_name: algitex-mcp-time
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-fetch:
    image: mcp/fetch:latest
    container_name: algitex-mcp-fetch
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-filesystem:
    image: mcp/filesystem:latest
    container_name: algitex-mcp-filesystem
    environment:
      - MCP_TRANSPORT=stdio
      - ALLOW_DIRS=/workspace
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:ro
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-git:
    image: mcp/git:latest
    container_name: algitex-mcp-git
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:ro
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-postgres:
    image: mcp/postgres:latest
    container_name: algitex-mcp-postgres
    environment:
      - MCP_TRANSPORT=stdio
      - POSTGRES_URL=${POSTGRES_URL}
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-sqlite:
    image: mcp/sqlite:latest
    container_name: algitex-mcp-sqlite
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - ${PROJECT_DIR:-.}:/workspace
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-duckduckgo:
    image: mcp/duckduckgo:latest
    container_name: algitex-mcp-duckduckgo
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-brave-search:
    image: mcp/brave-search:latest
    container_name: algitex-mcp-brave-search
    environment:
      - MCP_TRANSPORT=stdio
      - BRAVE_API_KEY=${BRAVE_API_KEY}
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-browser:
    image: mcp/browser:latest
    container_name: algitex-mcp-browser
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-playwright:
    image: mcp/playwright:latest
    container_name: algitex-mcp-playwright
    environment:
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - algitex

  mcp-slack:
    image: mcp/slack:latest
    container_name: algitex-mcp-slack
    environment:
      - MCP_TRANSPORT=stdio
      - SLACK_TOKEN=${SLACK_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
    stdin_open: true
    tty: true
    networks:
      - algitex

networks:
  algitex:
    driver: bridge
